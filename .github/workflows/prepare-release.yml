name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# Required secrets:
#   NPM_TOKEN — npm granular access token (used by the publish workflow after merge)

permissions: read-all

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main'
    # Required reviewer(s) configured on the "release" environment must approve
    # before this job runs. Manage at Settings → Environments → release.
    environment: release
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Bump version (files only, no git commit)
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          npm version "$BUMP" --no-git-tag-version
          VERSION=$(jq -r .version package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=release/v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify release branch can be created
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.bump.outputs.branch }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          if ! git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH is available."
            exit 0
          fi

          # Branch exists. Distinguish "active release PR" from "orphan from a failed run".
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "::error::Branch $BRANCH already has an open PR #${PR_NUMBER}. Close or merge it before re-running this workflow."
          else
            echo "::error::Branch $BRANCH exists on origin but has no open PR (orphan from a previous failed run). Delete it and re-run: gh api -X DELETE /repos/${{ github.repository }}/git/refs/heads/$BRANCH"
          fi
          exit 1

      - name: Add CHANGELOG placeholder
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          echo "<!-- Add release notes for v${VERSION} here before merging the PR -->" \
            > /tmp/placeholder.md
          node scripts/update-changelog.mjs "$VERSION" /tmp/placeholder.md

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch, commit and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          git checkout -b "$BRANCH"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"
          git push origin "$BRANCH"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          VERSION: ${{ steps.bump.outputs.version }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          # Find the previous tag (if any) so we can link a useful Compare view.
          # actions/checkout defaults to a shallow clone without tags, so fetch
          # them lazily here instead of in the checkout step.
          git fetch --tags --quiet origin || true
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)
          if [ -n "$PREV_TAG" ]; then
            COMPARE_LINK="[\`${PREV_TAG}...${BRANCH}\`](${REPO_URL}/compare/${PREV_TAG}...${BRANCH})"
          else
            COMPARE_LINK="_(no previous release tag found)_"
          fi

          BODY=$(cat <<EOF
          ## Summary

          Bumps version to **v${VERSION}** in preparation for publishing to npm and GitHub Packages.

          This PR was automatically generated by the **Prepare Release** workflow.

          ## Type of change

          - [x] CI / tooling — release preparation

          ## Files changed

          - \`package.json\` — version bump to v${VERSION}
          - \`package-lock.json\` — version bump
          - \`CHANGELOG.md\` — placeholder entry to be filled in before merge

          ## Before merging

          - [ ] Edit \`CHANGELOG.md\` on this branch to replace the placeholder with the actual release notes for v${VERSION}

          ## After merge

          The \`publish.yml\` workflow will automatically:

          - Create git tag \`v${VERSION}\`
          - Build the distribution
          - Publish to npm (\`korinfra@${VERSION}\`)
          - Publish to GitHub Packages (\`@korinfra/korinfra@${VERSION}\`)
          - Create a GitHub Release using the CHANGELOG entry as the release body

          ## Compare

          ${COMPARE_LINK}
          EOF
          )
          gh pr create \
            --title "chore(release): v${VERSION}" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"
