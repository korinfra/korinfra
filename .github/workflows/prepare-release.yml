name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# Required secrets:
#   NPM_TOKEN — npm granular access token (used by the publish workflow after merge)

permissions: read-all

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main'
    # Required reviewer(s) configured on the "release" environment must approve
    # before this job runs. Manage at Settings → Environments → release.
    environment: release
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Bump version (files only, no git commit)
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          npm version "$BUMP" --no-git-tag-version
          VERSION=$(jq -r .version package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=release/v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify release branch does not already exist
        env:
          BRANCH: ${{ steps.bump.outputs.branch }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::error::Branch $BRANCH already exists on origin. A release PR for v$VERSION may already be open — close or merge it first."
            exit 1
          fi

      - name: Add CHANGELOG placeholder
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          echo "<!-- Add release notes for v${VERSION} here before merging the PR -->" \
            > /tmp/placeholder.md
          node scripts/update-changelog.mjs "$VERSION" /tmp/placeholder.md

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch, commit and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          git checkout -b "$BRANCH"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release v${VERSION}"
          git push origin "$BRANCH"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          gh pr create \
            --title "chore: release v${VERSION}" \
            --body "$(printf '## Release v%s\n\nThis PR was automatically generated by the **Prepare Release** workflow.\n\n**Before merging:**\n- Edit `CHANGELOG.md` on this branch to replace the placeholder with the actual release notes\n\n**After merge, the publish workflow will automatically:**\n- Create git tag `v%s`\n- Build and publish to npm and GitHub Packages\n- Create a GitHub Release with the CHANGELOG entry as the body' \
              "$VERSION" "$VERSION")" \
            --base main \
            --head "$BRANCH"
