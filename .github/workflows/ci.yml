name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package*.json'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package*.json'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

permissions: read-all

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/dependency-review-action@5a2ce3f5b5782e8a394e16c58b0e92374b37b7e3 # v4
        with:
          fail-on-severity: high

  check:
    name: Check (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2
        with:
          disable-sudo: true
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit npm signatures
        run: npm audit signatures

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Verify lockfile integrity
        run: npm run lint:lockfile

      - name: Type check
        run: npm run typecheck

      - name: Lint code
        run: npm run lint

      - name: Lint secrets
        run: npm run lint:secrets

      - name: Run tests
        run: npm test

      - name: Build distribution
        run: npm run build

      - if: matrix.node == 20
        name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-node-20
          path: dist/
          retention-days: 7
