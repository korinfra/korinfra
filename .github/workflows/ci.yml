name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package*.json'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package*.json'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

permissions: read-all

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-22.04
    timeout-minutes: 7
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache build artifacts (tsBuildInfo + ESLint + Vite)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            node_modules/.cache/tsconfig.tsbuildinfo
            node_modules/.cache/eslint/
            node_modules/.vite/
          key: ${{ runner.os }}-build-cache-${{ hashFiles('package-lock.json', 'src/**/*.ts', 'tsconfig.json', 'eslint.config.js', 'vitest.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-build-cache-

      - name: Verify lockfile integrity
        run: npm run lint:lockfile

      - name: Lint secrets
        run: npm run lint:secrets

      - name: Check (lint:md sequentially, then typecheck/lint/test in parallel)
        run: npm run check

      - name: Build distribution
        run: npm run build

  ci:
    name: ci
    runs-on: ubuntu-22.04
    needs: [check]
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.check.result }}" != "success" && "${{ needs.check.result }}" != "skipped" ]]; then
            echo "check failed: ${{ needs.check.result }}"
            exit 1
          fi
