name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package*.json'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package*.json'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - 'vitest.config.ts'
      - 'eslint.config.js'
      - 'scripts/**'
      - '.github/workflows/ci.yml'

permissions: read-all

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version: '22'

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache build artifacts (tsBuildInfo + ESLint)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            node_modules/.cache/tsconfig.tsbuildinfo
            node_modules/.cache/eslint/
          key: ${{ runner.os }}-build-cache-${{ hashFiles('package-lock.json', 'src/**/*.ts', 'tsconfig.json', 'eslint.config.js') }}
          restore-keys: |
            ${{ runner.os }}-build-cache-

      - name: Audit npm signatures
        run: npm audit signatures

      - name: Verify lockfile integrity
        run: npm run lint:lockfile

      - name: Lint secrets
        run: npm run lint:secrets

      - name: Check (typecheck + lint + lint:md + test in parallel)
        run: npm run check

      - name: Build distribution
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          disable-sudo: true
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        id: setup-node
        with:
          node-version: '22'

      - name: Cache node_modules
        id: node-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [check]
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "check failed: ${{ needs.check.result }}"
            exit 1
          fi
