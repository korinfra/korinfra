name: Publish Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

# Required secrets:
#   NPM_TOKEN — npm granular access token with Read and Write access on the package.
#               Add at: Settings → Secrets and variables → Actions → New repository secret

permissions: read-all

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    # Required reviewer(s) configured on the "release" environment must approve
    # before this job runs. Manage at Settings → Environments → release.
    environment: release
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check if this is a new release
        id: check
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="v${VERSION}"

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping publish (idempotent)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New release detected: ${TAG}"
            {
              echo "skip=false"
              echo "version=${VERSION}"
              echo "tag=${TAG}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Verify NPM_TOKEN is set
        if: steps.check.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "$NODE_AUTH_TOKEN" ]]; then
            echo "::error::NPM_TOKEN secret is not set. Add it at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build distribution
        if: steps.check.outputs.skip != 'true'
        run: npm run build

      - name: Extract CHANGELOG entry
        if: steps.check.outputs.skip != 'true'
        run: |
          node scripts/extract-changelog-entry.mjs "${{ steps.check.outputs.version }}" \
            > /tmp/changelog-entry.md
          echo "--- CHANGELOG entry ---"
          cat /tmp/changelog-entry.md
          if grep -q "^<!-- Add release notes for v" /tmp/changelog-entry.md; then
            echo "::error::CHANGELOG entry for ${{ steps.check.outputs.version }} is still a placeholder. Edit CHANGELOG.md before merging the release PR."
            exit 1
          fi

      - name: Create and push tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.check.outputs.tag }}" \
            -m "Release ${{ steps.check.outputs.tag }}"
          git push origin "${{ steps.check.outputs.tag }}"

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> "$NPM_CONFIG_USERCONFIG"
          npm pkg set name='@korinfra/korinfra'
          npm pkg set publishConfig.registry='https://npm.pkg.github.com'
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name: ${{ steps.check.outputs.tag }}
          body_path: /tmp/changelog-entry.md
          make_latest: true
          files: dist/*
