changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: '⚠️ Breaking Changes'
      labels:
        - breaking-change
        - 'type: breaking'
    - title: '✨ New Features'
      labels:
        - enhancement
        - 'type: feat'
        - feature
    - title: '🐛 Bug Fixes'
      labels:
        - bug
        - 'type: fix'
    - title: '⚡ Performance'
      labels:
        - performance
    - title: '🔒 Security'
      labels:
        - security
    - title: '📦 Dependencies'
      labels:
        - dependencies
    - title: '📖 Documentation'
      labels:
        - documentation
    - title: '🔧 Other Changes'
      labels:
        - '*'
