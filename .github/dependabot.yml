version: 2
updates:
  # npm dependencies: monthly updates, tightly grouped to minimize CI runs
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: '08:00'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      aws-sdk:
        patterns:
          - '@aws-sdk/*'
          - '@smithy/*'
      ai-providers:
        patterns:
          - '@anthropic-ai/*'
          - '@openai/*'
          - '@modelcontextprotocol/*'
      ui:
        patterns:
          - 'ink*'
          - 'react*'
          - '@inkjs/*'
      typescript-tooling:
        patterns:
          - 'typescript'
          - 'tsdown'
          - 'tsx'
          - '@types/*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
          - 'eslint*'
      development:
        dependency-type: development
        update-types:
          - 'minor'
          - 'patch'
    # Always allow patch and minor updates
    allow:
      - dependency-type: direct
    reviewers:
      - vladimirmocanu

  # GitHub Actions: weekly updates
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:30'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci'
      include: 'scope'
    reviewers:
      - vladimirmocanu
